<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scam.me — CS2 Skin Trading</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #161b22;
      --surface-2:   #1c2230;
      --border:      #2a3344;
      --muted:       #6b7a99;
      --white:       #e6edf3;
      --accent:      #f0c040;
      --accent-h:    #d4a82a;
      --success:     #3fb950;
      --danger:      #f85149;

      --r-consumer:   #b0c3d9;
      --r-industrial: #5e98d9;
      --r-milspec:    #4b69ff;
      --r-restricted: #8847ff;
      --r-classified: #d32ce6;
      --r-covert:     #eb4b4b;
      --r-contraband: #e4ae39;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(22,27,34,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -.3px;
    }
    .logo span { color: var(--accent); }
    nav { display: flex; gap: 24px; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      transition: color .15s;
    }
    nav a:hover { color: var(--white); }
    .btn-steam {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #1b2838;
      border: 1px solid #4c6b8a;
      color: var(--white);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-steam:hover { background: #2a3f5f; }
    .btn-steam svg { flex-shrink: 0; }

    /* ─── Layout ─────────────────────────────── */
    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
    }
    @media (max-width: 1024px) {
      .page { grid-template-columns: 1fr; }
      .trade-panel-wrap { position: static !important; }
    }

    /* ─── Section titles ─────────────────────── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-head h1 { font-size: 17px; font-weight: 700; }
    .section-head h2 { font-size: 15px; font-weight: 700; }
    .count { font-size: 12px; color: var(--muted); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* ─── Filter bar ─────────────────────────── */
    .filter-bar { margin-bottom: 16px; }
    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px 8px 34px;
      color: var(--white);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .pill {
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid transparent;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .pill:hover { color: var(--white); }
    .pill.active { color: inherit; }
    .vsep { width: 1px; height: 16px; background: var(--border); }
    select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--white);
      font-size: 11px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }
    .sort-select { margin-left: auto; }

    /* ─── Item grid ──────────────────────────── */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 8px;
    }

    /* ─── Item card ──────────────────────────── */
    .item-card {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--surface-2);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s, border-color .12s;
      user-select: none;
    }
    .item-card:hover { transform: scale(1.03); box-shadow: 0 4px 16px rgba(0,0,0,.4); }
    .item-card.selected-request { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(240,192,64,.15); }
    .item-card.selected-offer   { border-color: var(--success); box-shadow: 0 0 0 2px rgba(63,185,80,.15); }

    .rarity-stripe {
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      border-radius: 10px 10px 0 0;
    }
    .item-img-wrap {
      position: relative;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .item-img-wrap img {
      max-height: 80px;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
    }
    .float-bar {
      position: absolute;
      bottom: 0;
      left: 4px;
      right: 4px;
      height: 3px;
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .float-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(to right, #4ade80, #ef4444);
    }
    .item-info { margin-top: 6px; }
    .item-tag {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 2px;
    }
    .tag-st { color: #fb923c; }
    .tag-sv { color: #facc15; }
    .item-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--white);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .item-ext { font-size: 9px; color: var(--muted); margin-top: 2px; }
    .item-price {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-top: 4px;
    }
    .selected-badge {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .selected-badge span {
      background: rgba(63,185,80,.9);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .selected-badge.request span { background: rgba(240,192,64,.9); color: #000; }

    /* ─── Empty inventory ────────────────────── */
    .empty-inv {
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 40px 16px;
      text-align: center;
    }
    .empty-inv p { color: var(--muted); font-size: 13px; margin-bottom: 12px; }

    /* ─── Trade panel ────────────────────────── */
    .trade-panel-wrap {
      position: sticky;
      top: 72px;
      height: fit-content;
    }
    .trade-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .panel-title svg { color: var(--accent); }
    .panel-sides {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .panel-side-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .panel-side-label .lbl { font-size: 11px; color: var(--muted); font-weight: 500; }
    .panel-side-label .total { font-size: 11px; font-weight: 700; }
    .drop-zone {
      min-height: 84px;
      border-radius: 8px;
      border: 2px dashed var(--border);
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .drop-zone.offer   { border-color: rgba(63,185,80,.3); }
    .drop-zone.request { border-color: rgba(240,192,64,.3); }
    .drop-zone p {
      color: var(--muted);
      font-size: 10px;
      text-align: center;
      padding: 0 6px;
    }
    .drop-items { display: flex; flex-wrap: wrap; gap: 4px; width: 100%; }
    .mini-item {
      position: relative;
      width: 48px;
      height: 48px;
    }
    .mini-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--surface-2);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .mini-remove {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--danger);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
    }
    .mini-remove:hover { background: #c0392b; }

    .price-diff {
      border-radius: 8px;
      border: 1px solid;
      padding: 10px 14px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
    }
    .price-diff.positive { border-color: rgba(63,185,80,.3); background: rgba(63,185,80,.08); color: var(--success); }
    .price-diff.negative { border-color: rgba(248,81,73,.3); background: rgba(248,81,73,.08); color: var(--danger); }
    .price-diff .sub { font-size: 11px; font-weight: 400; opacity: .7; margin-top: 2px; }

    .btn-submit {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-submit:disabled {
      background: var(--surface-2);
      color: var(--muted);
      cursor: not-allowed;
    }
    .btn-submit:not(:disabled) {
      background: var(--accent);
      color: #000;
    }
    .btn-submit:not(:disabled):hover { background: var(--accent-h); }
  </style>
</head>
<body>

<!-- ─── Header ─────────────────────────────────── -->
<header>
  <div class="header-inner">
    <a href="/" class="logo"><span>⚔</span> Scam.me</a>
    <nav>
      <a href="#">Échanger</a>
      <a href="#">Inventaire</a>
      <a href="#">Historique</a>
    </nav>
    <button class="btn-steam" onclick="alert('Steam login — à implémenter')">
      <svg width="16" height="16" viewBox="0 0 27 27" fill="currentColor">
        <path d="M13.5 0C6.04 0 0 6.04 0 13.5c0 6.52 4.64 11.96 10.84 13.17l4.02-9.88a4.5 4.5 0 0 1-1.86-3.79 4.5 4.5 0 0 1 4.5-4.5 4.5 4.5 0 0 1 4.5 4.5 4.5 4.5 0 0 1-4.35 4.5l-3.84 4.03C13.84 27 13.67 27 13.5 27 6.04 27 0 20.96 0 13.5S6.04 0 13.5 0zm-3.35 17.77l-1.5.62a3 3 0 0 0 1.44 1.59 3 3 0 0 0 2.28.19 3 3 0 0 0 1.8-1.54 3 3 0 0 0 .19-2.28 3 3 0 0 0-1.54-1.8 3 3 0 0 0-2.07-.2l1.55 3.8-.15-.38zm6.35-3.27a2.5 2.5 0 0 0-2.5-2.5 2.5 2.5 0 0 0-2.5 2.5 2.5 2.5 0 0 0 2.5 2.5 2.5 2.5 0 0 0 2.5-2.5z"/>
      </svg>
      Connexion Steam
    </button>
  </div>
</header>

<!-- ─── Page ───────────────────────────────────── -->
<div class="page">

  <!-- Left column -->
  <div>

    <!-- Market -->
    <div class="section-head">
      <h1>Market</h1>
      <span class="count" id="market-count">0 skins</span>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Rechercher un skin..." oninput="applyFilters()" />
      </div>
      <div class="filter-row">
        <button class="pill" data-rarity="consumer"   style="--rc:#b0c3d9" onclick="toggleRarity(this)">Consumer</button>
        <button class="pill" data-rarity="industrial" style="--rc:#5e98d9" onclick="toggleRarity(this)">Industrial</button>
        <button class="pill" data-rarity="milspec"    style="--rc:#4b69ff" onclick="toggleRarity(this)">Mil-Spec</button>
        <button class="pill" data-rarity="restricted" style="--rc:#8847ff" onclick="toggleRarity(this)">Restricted</button>
        <button class="pill" data-rarity="classified" style="--rc:#d32ce6" onclick="toggleRarity(this)">Classified</button>
        <button class="pill" data-rarity="covert"     style="--rc:#eb4b4b" onclick="toggleRarity(this)">Covert</button>
        <button class="pill" data-rarity="contraband" style="--rc:#e4ae39" onclick="toggleRarity(this)">Contraband</button>
        <div class="vsep"></div>
        <select id="exterior-filter" onchange="applyFilters()">
          <option value="">Tous les extérieurs</option>
          <option>Factory New</option>
          <option>Minimal Wear</option>
          <option>Field-Tested</option>
          <option>Well-Worn</option>
          <option>Battle-Scarred</option>
        </select>
        <select id="sort-select" class="sort-select" onchange="applyFilters()">
          <option value="price_asc">Prix croissant</option>
          <option value="price_desc">Prix décroissant</option>
          <option value="name_asc">Nom A-Z</option>
          <option value="float_asc">Float bas</option>
        </select>
      </div>
    </div>

    <div class="item-grid" id="market-grid"></div>

    <hr class="divider" />

    <!-- Inventory -->
    <div class="section-head">
      <h2>Mon inventaire</h2>
    </div>
    <div id="inventory-area">
      <div class="empty-inv">
        <p>Connecte-toi pour voir ton inventaire</p>
        <button class="btn-steam" onclick="alert('Steam login — à implémenter')">
          <svg width="16" height="16" viewBox="0 0 27 27" fill="currentColor">
            <path d="M13.5 0C6.04 0 0 6.04 0 13.5c0 6.52 4.64 11.96 10.84 13.17l4.02-9.88a4.5 4.5 0 0 1-1.86-3.79 4.5 4.5 0 0 1 4.5-4.5 4.5 4.5 0 0 1 4.5 4.5 4.5 4.5 0 0 1-4.35 4.5l-3.84 4.03C13.84 27 13.67 27 13.5 27 6.04 27 0 20.96 0 13.5S6.04 0 13.5 0zm-3.35 17.77l-1.5.62a3 3 0 0 0 1.44 1.59 3 3 0 0 0 2.28.19 3 3 0 0 0 1.8-1.54 3 3 0 0 0 .19-2.28 3 3 0 0 0-1.54-1.8 3 3 0 0 0-2.07-.2l1.55 3.8-.15-.38zm6.35-3.27a2.5 2.5 0 0 0-2.5-2.5 2.5 2.5 0 0 0-2.5 2.5 2.5 2.5 0 0 0 2.5 2.5 2.5 2.5 0 0 0 2.5-2.5z"/>
          </svg>
          Connexion Steam
        </button>
      </div>
    </div>

  </div>

  <!-- Right column: Trade panel -->
  <aside class="trade-panel-wrap">
    <div class="trade-panel">
      <div class="panel-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M7 16l-4-4 4-4M17 8l4 4-4 4M14 4l-4 16"/>
        </svg>
        Résumé de l'échange
      </div>

      <div class="panel-sides">
        <!-- Offered -->
        <div>
          <div class="panel-side-label">
            <span class="lbl">Tu offres</span>
            <span class="total" id="offered-total"></span>
          </div>
          <div class="drop-zone offer" id="offered-zone">
            <p>Sélectionne des skins de ton inventaire</p>
          </div>
        </div>
        <!-- Requested -->
        <div>
          <div class="panel-side-label">
            <span class="lbl">Tu veux</span>
            <span class="total" id="requested-total"></span>
          </div>
          <div class="drop-zone request" id="requested-zone">
            <p>Sélectionne des skins du market</p>
          </div>
        </div>
      </div>

      <div class="price-diff positive" id="price-diff" style="display:none"></div>

      <button class="btn-submit" id="submit-btn" disabled onclick="handleSubmit()">
        Envoyer l'offre de trade
      </button>
    </div>
  </aside>

</div>

  { id:'m10',name:'Butterfly | Marble Fade', ext:'Factory New',    rarity:'covert',      price:1450.00, float:.007, stattrak:true,
    img:'https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I4D0hl5qoTg9wYYJQIAFZygpMbIFZkWFMoU6TASeepuKpz2xUpRB04D5CuZmyEB9lfvbKZGz0IodKNQ/360fx360f' },
  { id:'m11',name:'P250 | Sand Dune',        ext:'Field-Tested',   rarity:'consumer',    price:0.08, float:.35,
    img:'https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I4D0hl5qoTg9wYYJQIAFZygpMbIFZkWFMoU6TASeepuKpz2xUpRB04D5CuZmyEB9lfvbKZGz0IodKNQ/360fx360f' },
  { id:'m12',name:'FAMAS | Afterimage',      ext:'Minimal Wear',   rarity:'milspec',     price:1.20, float:.12,
    img:'https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I4D0hl5qoTg9wYYJQIAFZygpMbIFZkWFMoU6TASeepuKpz2xUpRB04D5CuZmyEB9lfvbKZGz0IodKNQ/360fx360f' },
];

const RARITY_COLORS = {
  consumer:'#b0c3d9', industrial:'#5e98d9', milspec:'#4b69ff',
  restricted:'#8847ff', classified:'#d32ce6', covert:'#eb4b4b', contraband:'#e4ae39',
};
const EXT_ABBR = { 'Factory New':'FN','Minimal Wear':'MW','Field-Tested':'FT','Well-Worn':'WW','Battle-Scarred':'BS' };

// ─── State ────────────────────────────────────────────────────────────────
let activeRarity = null;
let offeredItems   = [];   // from inventory
let requestedItems = [];   // from market

// ─── Rendering ───────────────────────────────────────────────────────────
function renderCard(item, side) {
  // side = 'request' (market) | 'offer' (inventory)
  const selectedSet = side === 'request' ? requestedItems : offeredItems;
  const isSelected  = selectedSet.some(i => i.id === item.id);
  const color = RARITY_COLORS[item.rarity] || '#fff';

  const pct = item.float ? Math.round(item.float * 100) : null;

  return `
    <div class="item-card ${isSelected ? 'selected-'+side : ''}"
         onclick="toggleItem(${JSON.stringify(item).replace(/"/g,'&quot;')}, '${side}')">
      <div class="rarity-stripe" style="background:${color}"></div>
      <div class="item-img-wrap">
        <img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.style.opacity='.3'" />
        ${pct !== null ? `<div class="float-bar"><div class="float-fill" style="width:${pct}%"></div></div>` : ''}
      </div>
      <div class="item-info">
        ${item.stattrak ? '<div class="item-tag tag-st">StatTrak™</div>' : ''}
        <div class="item-name">${item.name}</div>
        ${item.ext ? `<div class="item-ext">${EXT_ABBR[item.ext]||item.ext}</div>` : ''}
        <div class="item-price">${fmtPrice(item.price)}</div>
      </div>
      ${isSelected ? `<div class="selected-badge ${side}"><span>${side==='offer'?'OFFERT':'VOULU'}</span></div>` : ''}
    </div>`;
}

function renderMarket(items) {
  const grid = document.getElementById('market-grid');
  grid.innerHTML = items.map(i => renderCard(i, 'request')).join('');
  document.getElementById('market-count').textContent = items.length + ' skins';
}

// ─── Filters ─────────────────────────────────────────────────────────────
function applyFilters() {
  const q    = document.getElementById('search').value.toLowerCase();
  const ext  = document.getElementById('exterior-filter').value;
  const sort = document.getElementById('sort-select').value;

  let list = MARKET.filter(i => {
    if (q   && !i.name.toLowerCase().includes(q)) return false;
    if (ext && i.ext !== ext)                      return false;
    if (activeRarity && i.rarity !== activeRarity) return false;
    return true;
  });

  if (sort === 'price_asc')  list.sort((a,b) => a.price - b.price);
  if (sort === 'price_desc') list.sort((a,b) => b.price - a.price);
  if (sort === 'name_asc')   list.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'float_asc')  list.sort((a,b) => (a.float??1) - (b.float??1));

  renderMarket(list);
}

function toggleRarity(btn) {
  const key = btn.dataset.rarity;
  if (activeRarity === key) {
    activeRarity = null;
    btn.classList.remove('active');
    btn.style.borderColor = '';
    btn.style.color = '';
  } else {
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.remove('active');
      p.style.borderColor = '';
      p.style.color = '';
    });
    activeRarity = key;
    btn.classList.add('active');
    const c = btn.style.getPropertyValue('--rc');
    btn.style.borderColor = c;
    btn.style.color = c;
  }
  applyFilters();
}

// ─── Trade logic ─────────────────────────────────────────────────────────
function toggleItem(item, side) {
  if (side === 'request') {
    const idx = requestedItems.findIndex(i => i.id === item.id);
    if (idx >= 0) requestedItems.splice(idx, 1);
    else requestedItems.push(item);
  } else {
    const idx = offeredItems.findIndex(i => i.id === item.id);
    if (idx >= 0) offeredItems.splice(idx, 1);
    else offeredItems.push(item);
  }
  applyFilters();
  updatePanel();
}

function removeItem(id, side) {
  if (side === 'request') requestedItems = requestedItems.filter(i => i.id !== id);
  else                    offeredItems   = offeredItems.filter(i => i.id !== id);
  applyFilters();
  updatePanel();
}

function updatePanel() {
  // Offered zone
  const offZ = document.getElementById('offered-zone');
  const offT = document.getElementById('offered-total');
  if (offeredItems.length) {
    const tot = offeredItems.reduce((s,i) => s+i.price, 0);
    offT.textContent = fmtPrice(tot);
    offZ.innerHTML = `<div class="drop-items">${offeredItems.map(i =>
      `<div class="mini-item">
        <img src="${i.img}" alt="${i.name}" />
        <button class="mini-remove" onclick="removeItem('${i.id}','offer')">✕</button>
      </div>`).join('')}</div>`;
  } else {
    offT.textContent = '';
    offZ.innerHTML = '<p>Sélectionne des skins de ton inventaire</p>';
  }

  // Requested zone
  const reqZ = document.getElementById('requested-zone');
  const reqT = document.getElementById('requested-total');
  if (requestedItems.length) {
    const tot = requestedItems.reduce((s,i) => s+i.price, 0);
    reqT.textContent = fmtPrice(tot);
    reqZ.innerHTML = `<div class="drop-items">${requestedItems.map(i =>
      `<div class="mini-item">
        <img src="${i.img}" alt="${i.name}" />
        <button class="mini-remove" onclick="removeItem('${i.id}','request')">✕</button>
      </div>`).join('')}</div>`;
  } else {
    reqT.textContent = '';
    reqZ.innerHTML = '<p>Sélectionne des skins du market</p>';
  }

  // Price diff
  const diffEl = document.getElementById('price-diff');
  const btn    = document.getElementById('submit-btn');
  const isEmpty = !offeredItems.length && !requestedItems.length;

  if (!isEmpty) {
    const offTotal = offeredItems.reduce((s,i) => s+i.price, 0);
    const reqTotal = requestedItems.reduce((s,i) => s+i.price, 0);
    const diff = offTotal - reqTotal;
    diffEl.style.display = '';
    diffEl.className = 'price-diff ' + (diff >= 0 ? 'positive' : 'negative');
    diffEl.innerHTML = (diff >= 0 ? `+${fmtPrice(diff)} en ta faveur` : `${fmtPrice(diff)} en ta défaveur`)
      + `<div class="sub">Offert: ${fmtPrice(offTotal)} / Demandé: ${fmtPrice(reqTotal)}</div>`;
    btn.disabled = false;
  } else {
    diffEl.style.display = 'none';
    btn.disabled = true;
  }
}

function handleSubmit() {
  alert('Trade — à implémenter (Steam login requis)');
}

function fmtPrice(v) {
  return v < 1 ? v.toFixed(2)+'€' : v.toLocaleString('fr-FR', {minimumFractionDigits:2,maximumFractionDigits:2})+'€';
}

// ─── Init ─────────────────────────────────────────────────────────────────
applyFilters();
</script>
