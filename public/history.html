<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique — scam.me</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <style>
    .trade-row {
      display: grid;
      grid-template-columns: 140px 1fr 100px 100px;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      font-size: 0.875rem;
    }
    .trade-row__date   { color: var(--muted); }
    .trade-row__items  { display: flex; align-items: center; gap: 8px; color: var(--text-dim); }
    .trade-row__arrow  { color: var(--muted); }
    .trade-row__count  { font-weight: 500; color: var(--text); }
    .trade-row__diff   { font-weight: 600; text-align: right; }
    .trade-row__diff.positive { color: #4ade80; }
    .trade-row__diff.negative { color: #f87171; }
    .trade-row__status {
      text-align: right;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid currentColor;
    }
    .status--pending   { color: #fbbf24; }
    .status--sent      { color: #60a5fa; }
    .status--accepted  { color: #4ade80; }
    .status--declined  { color: #f87171; }
    .status--cancelled { color: var(--muted); }
    .status--expired   { color: var(--muted); }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="header__logo">scam.me</a>
    <nav class="header__nav">
      <a href="/trade.html">Trade</a>
      <a href="/inventory.html">Inventaire</a>
      <a href="/history.html">Historique</a>
    </nav>
    <div class="header__auth" id="header-auth"></div>
  </header>

  <main class="container">
    <h1 style="font-size:1.5rem; font-weight:700; margin-bottom:24px;">Historique des trades</h1>

    <div id="login-prompt" style="display:none; text-align:center; padding:64px 0; color:var(--muted);">
      <p>Connecte-toi pour voir ton historique</p>
      <a href="/auth/steam" class="btn-steam" style="display:inline-flex; margin-top:16px;">Connexion Steam</a>
    </div>

    <div id="trades-list"></div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/pages/history.js"></script>
</body>
</html>
