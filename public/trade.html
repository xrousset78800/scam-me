<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade — scam.me</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components/item-card.css">
  <link rel="stylesheet" href="/css/components/filter-bar.css">
  <link rel="stylesheet" href="/css/components/trade-panel.css">
  <style>
    .trade-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 16px;
      align-items: start;
    }
    .trade-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .trade-section__title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }
    @media (max-width: 900px) {
      .trade-layout { grid-template-columns: 1fr; }
      .trade-columns { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="header__logo">scam.me</a>
    <nav class="header__nav">
      <a href="/trade.html">Trade</a>
      <a href="/inventory.html">Inventaire</a>
      <a href="/history.html">Historique</a>
    </nav>
    <div class="header__auth" id="header-auth"></div>
  </header>

  <main class="container">
    <div class="trade-layout">

      <!-- Colonnes marché + inventaire -->
      <div class="trade-columns">

        <!-- Marché -->
        <div>
          <p class="trade-section__title">Marché</p>
          <div class="filter-bar">
            <div class="filter-bar__search">
              <svg class="filter-bar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input id="market-search" type="text" placeholder="Rechercher…">
            </div>
            <select id="market-sort" class="filter-bar__select">
              <option value="price_desc">Prix décroissant</option>
              <option value="price_asc">Prix croissant</option>
              <option value="name_asc">Nom A→Z</option>
            </select>
          </div>
          <div id="market-grid" class="items-grid"></div>
        </div>

        <!-- Inventaire -->
        <div>
          <p class="trade-section__title">Mon inventaire</p>
          <div id="inventory-grid" class="items-grid"></div>
        </div>

      </div>

      <!-- Panneau de trade -->
      <aside>
        <div class="trade-panel">
          <p class="trade-panel__title">Proposition de trade</p>

          <div>
            <p class="trade-panel__section-label">Tu offres</p>
            <div id="panel-offered" class="trade-panel__items empty"></div>
          </div>

          <div>
            <p class="trade-panel__section-label">Tu demandes</p>
            <div id="panel-requested" class="trade-panel__items empty"></div>
          </div>

          <div id="panel-diff" class="trade-panel__diff neutral">—</div>

          <button id="btn-trade" class="trade-panel__submit" disabled>
            Proposer le trade
          </button>
        </div>
      </aside>

    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/pages/trade.js"></script>
</body>
</html>
