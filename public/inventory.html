<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon inventaire — scam.me</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components/item-card.css">
  <link rel="stylesheet" href="/css/components/filter-bar.css">
</head>
<body>

  <header class="header">
    <a href="/" class="header__logo">scam.me</a>
    <nav class="header__nav">
      <a href="/trade.html">Trade</a>
      <a href="/inventory.html">Inventaire</a>
      <a href="/history.html">Historique</a>
    </nav>
    <div class="header__auth" id="header-auth"></div>
  </header>

  <main class="container">

    <!-- Invite de connexion (masquée si connecté) -->
    <div id="login-prompt" style="display:flex; flex-direction:column; align-items:center; gap:16px; padding:96px 0;">
      <p style="color:var(--muted)">Connecte-toi pour voir ton inventaire CS2</p>
      <a href="/auth/steam" class="btn-steam">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.38L12.1 12h-.1a3.5 3.5 0 0 1-3.5-3.5 3.5 3.5 0 0 1 3.5-3.5 3.5 3.5 0 0 1 3.5 3.5h0l-11.4 3.94C4.7 14.45 5.9 16 7.5 16a2.5 2.5 0 0 0 2.36-1.68l2.52.92A5 5 0 0 1 7.5 18.5a5 5 0 0 1-4.98-4.62L0 12.54V12C0 5.37 5.37 0 12 0z"/>
        </svg>
        Connexion Steam
      </a>
    </div>

    <!-- Contenu inventaire -->
    <div id="inventory-content">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <div>
          <h1 style="font-size:1.5rem; font-weight:700;">Mon inventaire</h1>
          <p style="font-size:0.875rem; color:var(--muted); margin-top:4px;">
            <span id="inventory-counter"></span>
            &nbsp;·&nbsp; valeur totale
            <span id="inventory-total" style="color:var(--accent); font-weight:600;"></span>
          </p>
        </div>
        <button id="btn-refresh" class="btn-steam" style="gap:6px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          Actualiser
        </button>
      </div>

      <!-- Filtres -->
      <div class="filter-bar">
        <div class="filter-bar__search">
          <svg class="filter-bar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="filter-search" type="text" placeholder="Rechercher…">
        </div>

        <div class="filter-bar__rarities">
          <button class="filter-pill" data-rarity="consumer">Consumer</button>
          <button class="filter-pill" data-rarity="industrial">Industrial</button>
          <button class="filter-pill" data-rarity="milspec">Mil-Spec</button>
          <button class="filter-pill" data-rarity="restricted">Restricted</button>
          <button class="filter-pill" data-rarity="classified">Classified</button>
          <button class="filter-pill" data-rarity="covert">Covert</button>
          <button class="filter-pill" data-rarity="contraband">Contraband</button>
        </div>

        <select id="filter-exterior" class="filter-bar__select">
          <option value="">Tous les exteriors</option>
          <option value="Factory New">Factory New</option>
          <option value="Minimal Wear">Minimal Wear</option>
          <option value="Field-Tested">Field-Tested</option>
          <option value="Well-Worn">Well-Worn</option>
          <option value="Battle-Scarred">Battle-Scarred</option>
        </select>

        <select id="filter-sort" class="filter-bar__select">
          <option value="price_desc">Prix décroissant</option>
          <option value="price_asc">Prix croissant</option>
          <option value="name_asc">Nom A→Z</option>
        </select>
      </div>

      <!-- Grille d'items -->
      <div id="inventory-grid" class="items-grid"></div>
    </div>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/pages/inventory.js"></script>
</body>
</html>
