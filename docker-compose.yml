services:

  # ── API + Frontend ──────────────────────────────────
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
      - .env.secrets
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      # DATABASE_URL: postgres://scamme:scamme@postgres:5432/scamme
    depends_on:
      - redis
      # - postgres
    volumes:
      # Hot reload en dev : monte le code source, ignore node_modules
      - ./server:/app/server
      - ./public:/app/public
    restart: unless-stopped

  # ── Redis (sessions, cache, queue) ──────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── PostgreSQL (décommenté quand la DB est prête) ───
  # postgres:
  #   image: postgres:16-alpine
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: scamme
  #     POSTGRES_PASSWORD: scamme
  #     POSTGRES_DB: scamme
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  redis_data:
  # pg_data:
